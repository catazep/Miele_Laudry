<div class="dialog-backdrop" (click)="close()">
  <div class="dialog-card" (click)="$event.stopPropagation()">
    @if (invoiceData(); as data) {
      <div class="dialog-header">
        <span class="dialog-title">[{{ data.userId }}] {{ data.deviceName }}</span>
        <button class="dialog-close" (click)="close()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="dialog-body">
        @if (data.invoiceLines.length === 0) {
          <div class="empty-state">Not available invoices</div>
        } @else {
          <app-lateral-tabs [tabs]="invoiceTabLabels(data.invoiceLines)" [(selectedIndex)]="selectedTab">
            @if (data.invoiceLines[selectedTab()]; as line) {
              <div class="invoice-field">
                <span class="invoice-label">Price</span>
                <span class="invoice-value">{{ line.totalPrice | number: '1.2-2' }}</span>
              </div>
              <div class="invoice-field">
                <span class="invoice-label">Currency</span>
                <span class="invoice-value">{{ line.currency }}</span>
              </div>
            }
          </app-lateral-tabs>
        }
      </div>
    } @else {
      <div class="dialog-loading">Loading...</div>
    }
  </div>
</div>
