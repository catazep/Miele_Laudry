<div class="devices" [style.max-width]="matTabGroupMaxWidth() + 'px'">
  <div class="devices__actions">
    @if (authService.isAdmin()) {
      <button mat-stroked-button (click)="addDevice()">Add Device</button>
    }
  </div>

  <mat-tab-group (selectedTabChange)="onTypeTabChange()">
    @for (group of deviceGroups(); track group.type) {
      <mat-tab [label]="group.type | titlecase">
        <div class="device-card">
          <app-lateral-tabs [tabs]="group.tabs" [(selectedIndex)]="selectedDeviceIndex">
            @if (group.devices[selectedDeviceIndex()]; as device) {
              @if (device.tariff) {
                <div class="device-field">
                  <span class="device-label">Price</span>
                  <span class="device-value">{{ device.tariff.price | number: '1.2-2' }}</span>
                </div>
                <div class="device-field">
                  <span class="device-label">Currency</span>
                  <span class="device-value">{{ device.tariff.currency }}</span>
                </div>
              } @else {
                <div class="empty-state">No tariff assigned</div>
              }
              <button
                mat-mini-fab
                color="primary"
                class="start-cycle-button"
                (click)="startCycle(device)"
              >
                <i class="fa-solid fa-plus"></i>
              </button>
            }
          </app-lateral-tabs>
        </div>
      </mat-tab>
    }
  </mat-tab-group>
</div>
