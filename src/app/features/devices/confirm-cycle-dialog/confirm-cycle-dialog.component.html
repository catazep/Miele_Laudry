<div class="dialog">
  <h2 class="dialog__title">Start Cycle</h2>
  <p class="dialog__body">Start a new cycle on <strong>{{ data.deviceName }}</strong>?</p>
  <div class="dialog__actions">
    <button mat-stroked-button (click)="cancel()">Cancel</button>
    <button mat-flat-button color="primary" (click)="confirm()">Start</button>
  </div>
</div>
